<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Алтай 2026 - маршрут</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f2ec;
      --panel: #ffffff;
      --ink: #1e2522;
      --muted: #65706b;
      --accent: #2f6f5e;
      --line: #d8d1c6;
      --danger: #a14031;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(440px, calc(100vw - 32px));
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 18px 60px rgba(31, 36, 33, 0.12);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }
    input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      font-size: 16px;
      color: var(--ink);
      background: #fff;
    }
    button {
      width: 100%;
      height: 44px;
      margin-top: 12px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }
    .error {
      min-height: 22px;
      margin-top: 10px;
      color: var(--danger);
      font-size: 14px;
      line-height: 1.4;
    }
  </style>
</head>

    const form = document.getElementById("unlock");
    const passwordInput = document.getElementById("password");
    const button = document.getElementById("button");
    const error = document.getElementById("error");
    const encoder = new TextEncoder();
    const decoder = new TextDecoder();

    function fromBase64(value) {
      return Uint8Array.from(atob(value), (char) => char.charCodeAt(0));
    }

    async function deriveKey(password, salt) {
      const baseKey = await crypto.subtle.importKey(
        "raw",
        encoder.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"],
      );
      return crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt,
          iterations: payload.iterations,
          hash: "SHA-256",
        },
        baseKey,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"],
      );
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      error.textContent = "";
      button.disabled = true;
      button.textContent = "Открываю...";

      try {
        const key = await deriveKey(passwordInput.value, fromBase64(payload.salt));
        const plaintext = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: fromBase64(payload.iv) },
          key,
          fromBase64(payload.data),
        );
        document.open();
        document.write(decoder.decode(plaintext));
        document.close();
      } catch {
        error.textContent = "Пароль не подошёл. Проверь регистр и дефисы.";
      } finally {
        button.disabled = false;
        button.textContent = "Открыть маршрут";
      }
    });
